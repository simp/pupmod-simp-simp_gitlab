---
HOSTS:
  alma9-server:
    roles:
    - server
    - default
    - master
    - el9
    platform: el-9-x86_64
    box: almalinux/9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 4096
    vagrant_cpus: 4
    family: almalinux-cloud/almalinux-9
    gce_machine_type: n1-standard-2
  alma9-permittedclient:
    roles:
    - client
    - permittedclient
    platform: el-9-x86_64
    box: almalinux/9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 512
    vagrant_cpus: 1
    family: almalinux-cloud/almalinux-9
    gce_machine_type: n1-standard-2
  alma9-ldapserver:
    roles:
    - client
    - unknownclient
    - ldapserver
    platform: el-9-x86_64
    box: almalinux/9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 1024
    vagrant_cpus: 1
    family: almalinux-cloud/almalinux-9
    gce_machine_type: n1-standard-2
CONFIG:
  log_level: verbose
  type: aio
  run_in_parallel:
  - install
  - config
  ssh:
    keepalive: true
    keepalive_interval: 10
    keepalive_maxcount: 60
  puppet_collection: <%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>
