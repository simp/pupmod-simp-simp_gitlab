---
HOSTS:
  oel10-server:
    roles:
    - server
    - default
    - master
    - el10
    platform: el-10-x86_64
    box: generic/oracle10
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 4096
    vagrant_cpus: 4
  oel10-permittedclient:
    roles:
    - client
    - permittedclient
    platform: el-10-x86_64
    box: generic/oracle10
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 512
    vagrant_cpus: 1
  oel10-ldapserver:
    roles:
    - client
    - unknownclient
    - ldapserver
    platform: el-10-x86_64
    box: generic/oracle10
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 1024
    vagrant_cpus: 1
CONFIG:
  log_level: verbose
  type: aio
  run_in_parallel:
  - install
  - config
  ssh:
    keepalive: true
    keepalive_interval: 10
    keepalive_maxcount: 60
  puppet_collection: <%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>
